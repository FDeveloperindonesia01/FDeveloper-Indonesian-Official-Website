<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDeveloper - Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:#070b14;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
position:relative;
color:#fff;
}

/* Background */

body::before{
content:'';
position:absolute;
width:700px;
height:700px;
background:#ff4f8b;
border-radius:50%;
filter:blur(250px);
opacity:.12;
top:-300px;
right:-300px;
}

body::after{
content:'';
position:absolute;
width:700px;
height:700px;
background:#00ff88;
border-radius:50%;
filter:blur(250px);
opacity:.08;
left:-300px;
bottom:-300px;
}

.particle{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.35;
animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-100px);
}
}

.container{
width:92%;
max-width:1350px;
display:grid;
grid-template-columns:700px 1fr;
gap:60px;
align-items:center;
position:relative;
z-index:5;
}

/* TERMINAL */

.terminal{
height:500px;
background:rgba(12,12,12,.82);
backdrop-filter:blur(20px);
border-radius:18px;
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 30px 80px rgba(0,0,0,.65),
0 0 50px rgba(255,79,139,.1);
}

.terminal-header{
height:48px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:rgba(255,255,255,.03);
border-bottom:1px solid rgba(255,255,255,.05);
}

.left-header{
display:flex;
align-items:center;
gap:12px;
font-size:14px;
color:#ddd;
}

.win-logo{
width:14px;
height:14px;
background:#00a4ef;
box-shadow:
16px 0 #00a4ef,
0 16px #00a4ef,
16px 16px #00a4ef;
transform:scale(.35);
}

.window-buttons{
display:flex;
gap:8px;
}

.circle{
width:12px;
height:12px;
border-radius:50%;
}

.red{background:#ff5f57;}
.yellow{background:#febc2e;}
.green{background:#28c840;}

#terminal{
height:452px;
overflow:hidden;
padding:20px;
font-family:Consolas,monospace;
font-size:14px;
line-height:1.7;
color:#00ff6a;
white-space:pre-wrap;
}

/* RIGHT */

.right{
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:340px;
max-width:100%;
margin-bottom:20px;

filter:
drop-shadow(0 0 20px rgba(255,79,139,.5))
drop-shadow(0 0 60px rgba(255,79,139,.3));

animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-12px);
}
}

h1{
font-size:3.2rem;
margin-bottom:15px;
}

.highlight{
color:#ff4f8b;
}

.desc{
max-width:550px;
opacity:.8;
line-height:1.9;
}

.status{
margin-top:25px;
display:flex;
align-items:center;
gap:12px;
}

.status-dot{
width:12px;
height:12px;
border-radius:50%;
background:#00ff6a;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{
box-shadow:0 0 0 0 rgba(0,255,106,.8);
}
100%{
box-shadow:0 0 0 18px rgba(0,255,106,0);
}
}

@media(max-width:1150px){

.container{
grid-template-columns:1fr;
}

.terminal{
width:100%;
}

h1{
font-size:2.3rem;
}

.logo{
width:260px;
}

}

</style>
</head>
<body>

<script>

for(let i=0;i<50;i++){

const p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=(6+Math.random()*12)+"s";

document.body.appendChild(p);

}

</script>

<div class="container">

<div class="terminal">

<div class="terminal-header">

<div class="left-header">

<div class="win-logo"></div>

<span>Windows Terminal - Administrator</span>

</div>

<div class="window-buttons">

<div class="circle red"></div>
<div class="circle yellow"></div>
<div class="circle green"></div>

</div>

</div>

<div id="terminal"></div>

</div>

<div class="right">

<img src="FDeveloper.png" class="logo" alt="FDeveloper">

<h1>
Website Sedang
<span class="highlight">Update</span>
</h1>

<div class="desc">
Kami sedang melakukan peningkatan sistem, optimasi server,
pembaruan keamanan, dan pengembangan fitur terbaru untuk
memberikan pengalaman yang lebih cepat, aman, dan stabil.
Silakan kembali beberapa saat lagi.
</div>

<div class="status">
<div class="status-dot"></div>
<div>Maintenance In Progress...</div>
</div>

</div>

</div>

<script>

const terminal =
document.getElementById("terminal");

const logs = [

"Microsoft Windows [Version 11.0.26100.1]",
"(c) Microsoft Corporation. All rights reserved.",
"",
"C:\\FDeveloper> dir /s",
"",
"Volume in drive C has no label.",
"Directory of C:\\FDeveloper",
"",
"index.html",
"style.css",
"app.js",
"dashboard.js",
"api.js",
"auth.js",
"maintenance.js",
"routes.js",
"",
"C:\\FDeveloper> tasklist",
"",
"node.exe                Running",
"nginx.exe               Running",
"mysql.exe               Running",
"redis.exe               Running",
"",
"C:\\FDeveloper> npm install",
"",
"Installing dependencies...",
"added 487 packages",
"",
"C:\\FDeveloper> npm run build",
"",
"Compiling production bundle...",
"",
"█████░░░░░░░░░░░░░░░ 25%",
"██████████░░░░░░░░░░ 50%",
"███████████████░░░░░ 75%",
"████████████████████ 100%",
"",
"[INFO] Compressing CSS",
"[INFO] Compressing JavaScript",
"[INFO] Optimizing Images",
"[INFO] Building Assets",
"[INFO] Updating Routes",
"[INFO] Generating Cache",
"",
"C:\\FDeveloper> git pull origin main",
"",
"Receiving objects...",
"Resolving deltas...",
"Already up to date.",
"",
"C:\\FDeveloper> artisan migrate",
"",
"Migrating database...",
"Database migration complete.",
"",
"C:\\FDeveloper> deploy --production",
"",
"Uploading assets...",
"Restarting Nginx...",
"Restarting Services...",
"Verifying Security...",
"",
"[SUCCESS] Deployment Complete",
"[SUCCESS] Service Restarted",
"[SUCCESS] Cache Cleared",
"[SUCCESS] System Optimized",
"",
"Website Status : Maintenance Mode",
"",
"C:\\FDeveloper>"
];

let lineIndex = 0;

function createLine(){

const div =
document.createElement("div");

terminal.appendChild(div);

let text = logs[lineIndex];

let charIndex = 0;

const typing = setInterval(()=>{

div.textContent += text.charAt(charIndex);

charIndex++;

terminal.scrollTop =
terminal.scrollHeight;

if(charIndex >= text.length){

clearInterval(typing);

lineIndex++;

if(lineIndex >= logs.length){

lineIndex = 0;

setTimeout(()=>{

terminal.innerHTML="";

createLine();

},1000);

return;

}

setTimeout(createLine,60);

}

},10);

}

createLine();

</script>

</body>
</html>
